<!doctype html>
<meta charset="utf-8">
<title>Timestretcher — offline time-stretch / pitch-shift</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  .row { display: flex; align-items: center; gap: .75rem; margin: .6rem 0; }
  label { width: 11rem; }
  input[type=range] { flex: 1; }
  button { padding: .5rem 1rem; }
  button:disabled { opacity: .5; }
  #status { margin-top: 1rem; color: #444; white-space: pre-wrap; font: 13px/1.5 monospace; }
</style>

<h1>Timestretcher</h1>
<p>Load a sample, stretch/pitch it offline, then play the result through a plain
<code>AudioBufferSourceNode</code>.</p>

<div class="row"><label for="file">Audio file</label><input type="file" id="file" accept="audio/*"></div>
<div class="row"><label for="time">Time ratio <span id="timeV">1.00</span></label>
  <input type="range" id="time" min="0.25" max="4" step="0.01" value="1"></div>
<div class="row"><label for="semi">Pitch (semitones) <span id="semiV">0</span></label>
  <input type="range" id="semi" min="-24" max="24" step="1" value="0"></div>
<div class="row"><label for="engine">Engine</label>
  <select id="engine"><option value="finer">Finer (R3)</option><option value="faster">Faster (R2)</option></select></div>
<div class="row"><label for="formant">Formant</label>
  <select id="formant"><option value="shifted">Shifted</option><option value="preserved">Preserved</option></select></div>

<div class="row">
  <button id="stretch" disabled>Stretch</button>
  <button id="play" disabled>Play</button>
  <button id="stop" disabled>Stop</button>
</div>
<div id="status">Load an audio file to begin.</div>

<script type="module">
  import { Timestretcher } from './src/Timestretcher.js';

  const $ = (id) => document.getElementById(id);
  const log = (m) => { $('status').textContent = m; };

  let ctx, original, stretched, source;

  $('time').addEventListener('input', () => $('timeV').textContent = (+$('time').value).toFixed(2));
  $('semi').addEventListener('input', () => $('semiV').textContent = $('semi').value);

  $('file').addEventListener('change', async (e) => {
    if (!e.target.files.length) return;
    ctx = ctx || new AudioContext();
    await Timestretcher.init();
    original = await ctx.decodeAudioData(await e.target.files[0].arrayBuffer());
    $('stretch').disabled = false;
    log(`Loaded: ${original.duration.toFixed(2)}s, ${original.numberOfChannels}ch @ ${original.sampleRate}Hz`);
  });

  $('stretch').addEventListener('click', async () => {
    $('stretch').disabled = true;
    log('Stretching…');
    const t0 = performance.now();
    stretched = await Timestretcher.timestretch(original, {
      timeRatio: +$('time').value,
      semitones: +$('semi').value,
      engine: $('engine').value,
      formant: $('formant').value
    });
    const ms = (performance.now() - t0).toFixed(0);
    $('stretch').disabled = false;
    $('play').disabled = false;
    log(`Done in ${ms}ms → ${stretched.duration.toFixed(2)}s (${stretched.length} frames)`);
  });

  $('play').addEventListener('click', () => {
    if (source) try { source.stop(); } catch {}
    source = new AudioBufferSourceNode(ctx, { buffer: stretched });
    source.connect(ctx.destination);
    source.onended = () => { $('stop').disabled = true; };
    source.start();
    $('stop').disabled = false;
  });

  $('stop').addEventListener('click', () => { if (source) source.stop(); });
</script>
